apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: archgen-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/ArchGenTf/Main.git'
    targetRevision: master
    path: manifests/prod
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
