apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: archgen-dev-api-gateway
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/ArchGenTf/Main.git'
    targetRevision: dev
    path: k8s/api-gateway
    helm:
      valueFiles:
        - values-dev.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
