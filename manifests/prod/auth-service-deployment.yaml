apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: prod
  name: archgen-prod-auth-service
  labels:
    app: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: archgen-prod-auth-service-sa
      containers:
        - name: auth-service
          image: "acrarchgen.azurecr.io/auth-service:latest"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8001
              protocol: TCP
          env:
            - name: DATABASE_NAME
              valueFrom:
                secretKeyRef:
                  name: archgen-prod-auth-service-secrets
                  key: DATABASE_NAME
            - name: JWT_ALGORITHM
              valueFrom:
                secretKeyRef:
                  name: archgen-prod-auth-service-secrets
                  key: JWT_ALGORITHM
            - name: ACCESS_TOKEN_EXPIRE_MINUTES
              valueFrom:
                secretKeyRef:
                  name: archgen-prod-auth-service-secrets
                  key: ACCESS_TOKEN_EXPIRE_MINUTES
            - name: REFRESH_TOKEN_EXPIRE_DAYS
              valueFrom:
                secretKeyRef:
                  name: archgen-prod-auth-service-secrets
                  key: REFRESH_TOKEN_EXPIRE_DAYS
            - name: ALLOWED_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: archgen-prod-auth-service-secrets
                  key: ALLOWED_ORIGINS
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: archgen-prod-auth-service-secrets
                  key: JWT_SECRET_KEY
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: archgen-prod-auth-service-secrets
                  key: MONGO_URI
          volumeMounts:
            - name: secrets-store-inline
              mountPath: "/mnt/secrets-store"
              readOnly: true
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi
      volumes:
        - name: secrets-store-inline
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: "archgen-prod-auth-service-keyvault-provider"
