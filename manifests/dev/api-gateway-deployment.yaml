apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: dev
  name: archgen-dev-api-gateway
  labels:
    app: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: archgen-dev-api-gateway-sa
      containers:
        - name: api-gateway
          image: "acrarchgen.azurecr.io/api-gateway:latest"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: GATEWAY_PORT
              valueFrom:
                secretKeyRef:
                  name: archgen-dev-api-gateway-secrets
                  key: GATEWAY_PORT
            - name: PRODUCTION_ORIGIN
              valueFrom:
                secretKeyRef:
                  name: archgen-dev-api-gateway-secrets
                  key: PRODUCTION_ORIGIN
            - name: AUTH_SERVICE_URL
              valueFrom:
                secretKeyRef:
                  name: archgen-dev-api-gateway-secrets
                  key: AUTH_SERVICE_URL
            - name: PROJECT_SERVICE_URL
              valueFrom:
                secretKeyRef:
                  name: archgen-dev-api-gateway-secrets
                  key: PROJECT_SERVICE_URL
            - name: ARCHITECTURE_SERVICE_URL
              valueFrom:
                secretKeyRef:
                  name: archgen-dev-api-gateway-secrets
                  key: ARCHITECTURE_SERVICE_URL
            - name: ALLOWED_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: archgen-dev-api-gateway-secrets
                  key: ALLOWED_ORIGINS
          volumeMounts:
            - name: secrets-store-inline
              mountPath: "/mnt/secrets-store"
              readOnly: true
          resources:
            limits:
              cpu: 150m
              memory: 256Mi
            requests:
              cpu: 75m
              memory: 128Mi
      volumes:
        - name: secrets-store-inline
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: "archgen-dev-api-gateway-keyvault-provider"
