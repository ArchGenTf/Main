apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  namespace: dev
  name: archgen-dev-ingress
  labels:
    app: unified-ingress
  annotations:
    kubernetes.io/ingress.class: azure/application-gateway
    appgw.ingress.kubernetes.io/request-timeout: "30"
    appgw.ingress.kubernetes.io/connection-draining: "true"
    appgw.ingress.kubernetes.io/connection-draining-timeout: "30"
spec:
  rules:
    - host: dev.archgen.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: archgen-dev-api-gateway
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: archgen-dev-frontend
                port:
                  number: 80
