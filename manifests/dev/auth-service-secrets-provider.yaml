apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  namespace: dev
  name: archgen-dev-auth-service-keyvault-provider
spec:
  provider: azure
  secretObjects:
    - secretName: archgen-dev-auth-service-secrets
      type: Opaque
      data:
        - objectName: JWT_SECRET_KEY
          key: JWT_SECRET_KEY
        - objectName: MONGO_URI
          key: MONGO_URI
        - objectName: DATABASE_NAME
          key: DATABASE_NAME
        - objectName: JWT_ALGORITHM
          key: JWT_ALGORITHM
        - objectName: ACCESS_TOKEN_EXPIRE_MINUTES
          key: ACCESS_TOKEN_EXPIRE_MINUTES
        - objectName: REFRESH_TOKEN_EXPIRE_DAYS
          key: REFRESH_TOKEN_EXPIRE_DAYS
        - objectName: ALLOWED_ORIGINS
          key: ALLOWED_ORIGINS
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: "1e9e4c11-d7fb-448f-b440-6e1ea1993bf4"
    keyvaultName: "kvpraveen"
    objects: |
      array:
        - |
          objectName: dev-jwt-secret
          objectType: secret
          objectAlias: JWT_SECRET_KEY
        - |
          objectName: dev-cosmos-connection-string
          objectType: secret
          objectAlias: MONGO_URI
        - |
          objectName: dev-database-name
          objectType: secret
          objectAlias: DATABASE_NAME
        - |
          objectName: dev-jwt-algorithm
          objectType: secret
          objectAlias: JWT_ALGORITHM
        - |
          objectName: dev-access-token-expire-minutes
          objectType: secret
          objectAlias: ACCESS_TOKEN_EXPIRE_MINUTES
        - |
          objectName: dev-refresh-token-expire-days
          objectType: secret
          objectAlias: REFRESH_TOKEN_EXPIRE_DAYS
        - |
          objectName: dev-allowed-origins
          objectType: secret
          objectAlias: ALLOWED_ORIGINS
    tenantId: "d8537334-bc24-4daf-95a8-bf4c9fb14394"
