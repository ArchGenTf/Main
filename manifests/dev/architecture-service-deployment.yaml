apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: dev
  name: archgen-dev-architecture-service
  labels:
    app: architecture-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: architecture-service
  template:
    metadata:
      labels:
        app: architecture-service
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: archgen-dev-architecture-service-sa
      containers:
        - name: architecture-service
          image: "acrarchgen.azurecr.io/architecture-service:latest"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8003
              protocol: TCP
          env:
            - name: OPENAI_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: archgen-dev-architecture-service-secrets
                  key: OPENAI_BASE_URL
            - name: OPENAI_MODEL
              valueFrom:
                secretKeyRef:
                  name: archgen-dev-architecture-service-secrets
                  key: OPENAI_MODEL
            - name: OLLAMA_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: archgen-dev-architecture-service-secrets
                  key: OLLAMA_BASE_URL
            - name: OLLAMA_MODEL
              valueFrom:
                secretKeyRef:
                  name: archgen-dev-architecture-service-secrets
                  key: OLLAMA_MODEL
            - name: DEFAULT_PROVIDER
              valueFrom:
                secretKeyRef:
                  name: archgen-dev-architecture-service-secrets
                  key: DEFAULT_PROVIDER
            - name: CACHE_ENABLED
              valueFrom:
                secretKeyRef:
                  name: archgen-dev-architecture-service-secrets
                  key: CACHE_ENABLED
            - name: CACHE_TTL
              valueFrom:
                secretKeyRef:
                  name: archgen-dev-architecture-service-secrets
                  key: CACHE_TTL
            - name: MAX_PROVIDER_TIMEOUT
              valueFrom:
                secretKeyRef:
                  name: archgen-dev-architecture-service-secrets
                  key: MAX_PROVIDER_TIMEOUT
            - name: MAX_ENRICHMENT_TIME
              valueFrom:
                secretKeyRef:
                  name: archgen-dev-architecture-service-secrets
                  key: MAX_ENRICHMENT_TIME
            - name: DATABASE_NAME
              valueFrom:
                secretKeyRef:
                  name: archgen-dev-architecture-service-secrets
                  key: DATABASE_NAME
            - name: LOG_LEVEL
              valueFrom:
                secretKeyRef:
                  name: archgen-dev-architecture-service-secrets
                  key: LOG_LEVEL
            - name: ALLOWED_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: archgen-dev-architecture-service-secrets
                  key: ALLOWED_ORIGINS
            - name: ARCHGEN_GENERATION_MODE
              valueFrom:
                secretKeyRef:
                  name: archgen-dev-architecture-service-secrets
                  key: ARCHGEN_GENERATION_MODE
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: archgen-dev-architecture-service-secrets
                  key: OPENAI_API_KEY
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: archgen-dev-architecture-service-secrets
                  key: DEEPSEEK_API_KEY
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: archgen-dev-architecture-service-secrets
                  key: JWT_SECRET_KEY
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: archgen-dev-architecture-service-secrets
                  key: MONGO_URI
          volumeMounts:
            - name: secrets-store-inline
              mountPath: "/mnt/secrets-store"
              readOnly: true
          resources:
            limits:
              cpu: 250m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi
      volumes:
        - name: secrets-store-inline
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: "archgen-dev-architecture-service-keyvault-provider"
