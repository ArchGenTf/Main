replicaCount: 2
image:
  repository: acrarchgen.azurecr.io/frontend
  pullPolicy: IfNotPresent
  tag: "v1.2.0"
service:
  type: ClusterIP
  port: 80
ingress:
  enabled: true
  className: "azure-application-gateway"
  annotations:
    appgw.ingress.kubernetes.io/ssl-redirect: "false"
  hosts:
    - host: ""
      paths:
        - path: /
          pathType: Prefix
    - host: prod.archgen.com
      paths:
        - path: /
          pathType: Prefix
    - host: frontend.archgen.com
      paths:
        - path: /
          pathType: Prefix
    - host: archgen.com
      paths:
        - path: /
          pathType: Prefix
resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
