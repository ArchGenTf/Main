replicaCount: 2

image:
  repository: acrarchgen.azurecr.io/architecture-service
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 8003

resources:
  limits:
    cpu: 500m
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

config: {}

keyvault:
  enabled: true
  name: "kvpraveen"
  clientId: "1e9e4c11-d7fb-448f-b440-6e1ea1993bf4"
  tenantId: "d8537334-bc24-4daf-95a8-bf4c9fb14394"
  secrets:
    - name: "prod-openai-api-key"
      alias: "OPENAI_API_KEY"
    - name: "prod-openai-base-url"
      alias: "OPENAI_BASE_URL"
    - name: "prod-openai-model"
      alias: "OPENAI_MODEL"
    - name: "prod-deepseek-api-key"
      alias: "DEEPSEEK_API_KEY"
    - name: "prod-ollama-base-url"
      alias: "OLLAMA_BASE_URL"
    - name: "prod-ollama-model"
      alias: "OLLAMA_MODEL"
    - name: "prod-default-provider"
      alias: "DEFAULT_PROVIDER"
    - name: "prod-cache-enabled"
      alias: "CACHE_ENABLED"
    - name: "prod-cache-ttl"
      alias: "CACHE_TTL"
    - name: "prod-max-provider-timeout"
      alias: "MAX_PROVIDER_TIMEOUT"
    - name: "prod-max-enrichment-time"
      alias: "MAX_ENRICHMENT_TIME"
    - name: "prod-cosmos-connection-string"
      alias: "MONGO_URI"
    - name: "prod-database-name"
      alias: "DATABASE_NAME"
    - name: "prod-jwt-secret"
      alias: "JWT_SECRET_KEY"
    - name: "prod-log-level"
      alias: "LOG_LEVEL"
    - name: "prod-allowed-origins"
      alias: "ALLOWED_ORIGINS"
    - name: "prod-archgen-generation-mode"
      alias: "ARCHGEN_GENERATION_MODE"

nodeSelector: {}
tolerations: []
affinity: {}
