replicaCount: 2

image:
  repository: acrarchgen.azurecr.io/auth-service
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 8001

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

config: {}

keyvault:
  enabled: true
  name: "kvpraveen"
  clientId: "1e9e4c11-d7fb-448f-b440-6e1ea1993bf4"
  tenantId: "d8537334-bc24-4daf-95a8-bf4c9fb14394"
  secrets:
    - name: "prod-database-name"
      alias: "DATABASE_NAME"
    - name: "prod-jwt-algorithm"
      alias: "JWT_ALGORITHM"
    - name: "prod-access-token-expire-minutes"
      alias: "ACCESS_TOKEN_EXPIRE_MINUTES"
    - name: "prod-refresh-token-expire-days"
      alias: "REFRESH_TOKEN_EXPIRE_DAYS"
    - name: "prod-allowed-origins"
      alias: "ALLOWED_ORIGINS"
    - name: "prod-jwt-secret"
      alias: "JWT_SECRET_KEY"
    - name: "prod-cosmos-connection-string"
      alias: "MONGO_URI"

nodeSelector: {}
tolerations: []
affinity: {}
