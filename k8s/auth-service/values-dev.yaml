replicaCount: 1
image:
  repository: acrarchgen.azurecr.io/auth-service
  pullPolicy: IfNotPresent
  tag: "sha-ef2efdb"
service:
  type: ClusterIP
  port: 8001
resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 80
config:
  DATABASE_NAME: "archgen_db"
  JWT_ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  REFRESH_TOKEN_EXPIRE_DAYS: "7"
  ALLOWED_ORIGINS: "http://localhost:3000,http://20.51.185.99:3000"

keyvault:
  enabled: true
  name: "kvpraveen"
  clientId: "1e9e4c11-d7fb-448f-b440-6e1ea1993bf4"
  tenantId: "d8537334-bc24-4daf-95a8-bf4c9fb14394"
  secrets:
    - name: "dev-jwt-secret"
      alias: "JWT_SECRET_KEY"
    - name: "dev-cosmos-connection-string"
      alias: "MONGO_URI"
nodeSelector: {}
tolerations: []
affinity: {}
